<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065F46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" rx="12"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="120" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1150" cy="180" r="300" fill="rgba(255,255,255,0.02)"/>
  <circle cx="180" cy="520" r="250" fill="rgba(255,255,255,0.02)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- House icon -->
  <g transform="translate(100, 200)" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 45 L40 10 L77 45" />
    <path d="M12 40 L12 72 L68 72 L68 40" />
    <rect x="30" y="48" width="20" height="24" />
    <rect x="48" y="48" width="12" height="12" />
  </g>

  <!-- AI brain icon -->
  <g transform="translate(100, 310)" fill="none" stroke="rgba(52,211,153,0.8)" stroke-width="2.5">
    <circle cx="40" cy="30" r="25" />
    <path d="M28 20 Q40 10 52 20" />
    <path d="M28 30 Q40 20 52 30" />
    <path d="M28 40 Q40 30 52 40" />
    <circle cx="35" cy="25" r="3" fill="rgba(52,211,153,0.8)"/>
    <circle cx="45" cy="25" r="3" fill="rgba(52,211,153,0.8)"/>
    <circle cx="40" cy="35" r="3" fill="rgba(52,211,153,0.8)"/>
    <line x1="35" y1="25" x2="40" y2="35" />
    <line x1="45" y1="25" x2="40" y2="35" />
  </g>

  <!-- SMS icon -->
  <g transform="translate(100, 420)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round">
    <rect x="15" y="5" width="50" height="70" rx="8" />
    <line x1="30" y1="60" x2="50" y2="60" />
    <circle cx="25" cy="35" r="3" fill="rgba(52,211,153,0.6)"/>
    <circle cx="40" cy="35" r="3" fill="rgba(52,211,153,0.6)"/>
    <circle cx="55" cy="35" r="3" fill="rgba(52,211,153,0.6)"/>
  </g>

  <!-- Title -->
  <text x="250" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">
    NestEase
  </text>

  <!-- Subtitle -->
  <text x="250" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.85)">
    AI-Powered Property Management Platform
  </text>

  <!-- Description -->
  <text x="250" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">
    Automate work orders, contractor communication, and maintenance workflows
  </text>
  <text x="250" y="388" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">
    with an AI agent that speaks your contractors' language.
  </text>

  <!-- Tech badges -->
  <g transform="translate(250, 430)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="40" y="19" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Next.js</text>

    <rect x="90" y="0" width="100" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="140" y="19" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">TypeScript</text>

    <rect x="200" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="245" y="19" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Supabase</text>

    <rect x="300" y="0" width="90" height="28" rx="14" fill="rgba(52,211,153,0.3)"/>
    <text x="345" y="19" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Claude AI</text>

    <rect x="400" y="0" width="70" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="435" y="19" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Telnyx</text>

    <rect x="480" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="520" y="19" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">Railway</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="250" y="490" width="120" height="3" rx="1.5" fill="rgba(52,211,153,0.6)"/>

  <!-- Tagline -->
  <text x="250" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="3">
    FULL-STACK  ·  AI-NATIVE  ·  BILINGUAL
  </text>
</svg>
